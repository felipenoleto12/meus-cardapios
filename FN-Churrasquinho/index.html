<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FN Churrasquinho | Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .category-active { border-bottom: 3px solid var(--primary); color: var(--primary); font-weight: 700; }
        .product-card { transition: transform 0.1s ease, background-color 0.2s ease; }
        .product-card:active { transform: scale(0.97); background-color: #18181b; }
        .sticky-nav { position: sticky; top: 0; z-index: 40; backdrop-blur: 12px; background: rgba(9, 9, 11, 0.8); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- Header com Parallax Simulado -->
    <header class="relative h-56 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1000" class="w-full h-full object-cover opacity-60" alt="Churrasco">
        <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 p-6 w-full">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tighter">FN Churrasquinho</h1>
                    <div id="status-badge" class="mt-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></div>
                </div>
                <button onclick="toggleAdmin()" class="p-2 bg-white/10 rounded-full backdrop-blur-md border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Barra de Pesquisa -->
    <div class="px-4 py-2 bg-zinc-950 sticky top-0 z-50">
        <div class="relative max-w-md mx-auto">
            <input type="text" id="search-input" oninput="filterMenu()" placeholder="O que você quer comer hoje?" 
                class="w-full bg-zinc-900 border-none rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-red-500 outline-none text-sm shadow-2xl">
            <svg class="absolute left-4 top-4 h-5 w-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
    </div>

    <!-- Navegação por Categorias -->
    <nav class="sticky-nav border-b border-zinc-800/50 mb-4 overflow-x-auto hide-scrollbar flex whitespace-nowrap px-4" id="category-nav"></nav>

    <!-- Menu Principal -->
    <main class="max-w-md mx-auto px-4 pb-40 space-y-8" id="main-menu"></main>

    <!-- Rodapé da Sacola -->
    <footer id="footer-cart" class="fixed bottom-0 left-0 right-0 bg-zinc-900/95 backdrop-blur-2xl border-t border-zinc-800 p-4 transform translate-y-full transition-all duration-300 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <span class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Seu Pedido</span>
                <p class="text-xl font-black text-white" id="footer-total">R$ 0,00</p>
            </div>
            <button onclick="toggleCart(true)" class="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-2xl font-extrabold transition-all active:scale-95 flex items-center gap-2 shadow-lg shadow-red-900/40">
                VER SACOLA
                <span id="cart-count-badge" class="bg-white/20 px-2 py-0.5 rounded-lg text-sm">0</span>
            </button>
        </div>
    </footer>

    <!-- Modal Admin -->
    <div id="admin-panel" class="fixed inset-0 bg-black z-[100] hidden overflow-y-auto p-4 sm:p-6">
        <div class="max-w-md mx-auto space-y-6 pb-20">
            <div class="flex justify-between items-center py-4 sticky top-0 bg-black z-10 border-b border-zinc-800">
                <h2 class="text-2xl font-black text-red-500 italic uppercase">Gestão FN</h2>
                <button onclick="closeAdmin()" class="bg-zinc-800 p-3 rounded-xl font-bold">X</button>
            </div>
            
            <!-- Chave PIX -->
            <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 shadow-xl">
                <p class="text-xs font-bold text-zinc-500 uppercase mb-4 tracking-widest">Configuração de Pagamento</p>
                <div class="space-y-3">
                    <label class="text-[10px] text-zinc-400 font-bold uppercase">Chave PIX do Estabelecimento</label>
                    <div class="flex gap-2">
                        <input type="text" id="pix-key-input" placeholder="Celular, CPF ou Aleatória" class="flex-1 bg-zinc-800 rounded-xl p-3 outline-none focus:ring-1 focus:ring-red-500 transition-all">
                        <button onclick="updatePixKey()" class="bg-blue-600 px-6 rounded-xl font-bold hover:bg-blue-700 transition-colors">Salvar</button>
                    </div>
                </div>
            </div>

            <!-- Formulários de Categoria e Produto -->
            <section class="space-y-4">
                <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800">
                    <p class="text-xs font-bold text-zinc-500 uppercase mb-4 tracking-widest">Nova Categoria</p>
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-name" placeholder="Ex: Combos" class="flex-1 bg-zinc-800 rounded-xl p-3 outline-none">
                        <button onclick="addCategory()" class="bg-red-600 px-6 rounded-xl font-bold">+</button>
                    </div>
                    <div id="admin-cat-list" class="flex flex-wrap gap-2 mt-4"></div>
                </div>

                <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 shadow-xl">
                    <p class="text-xs font-bold text-zinc-500 uppercase mb-4 tracking-widest" id="form-title">Novo Produto</p>
                    <form onsubmit="handleProductSubmit(event)" id="product-form" class="space-y-4">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="p-name" placeholder="Nome do Produto" required class="w-full bg-zinc-800 rounded-xl p-4 outline-none border border-transparent focus:border-red-500">
                        <div class="flex gap-2">
                            <input type="number" step="0.01" id="p-price" placeholder="Preço" required class="w-1/3 bg-zinc-800 rounded-xl p-4 outline-none">
                            <select id="p-cat" class="flex-1 bg-zinc-800 rounded-xl p-4 outline-none"></select>
                        </div>
                        <textarea id="p-desc" placeholder="Descrição curta" required class="w-full bg-zinc-800 rounded-xl p-4 outline-none h-20"></textarea>
                        <input type="url" id="p-img" placeholder="URL da Foto (Unsplash ou similar)" class="w-full bg-zinc-800 rounded-xl p-4 outline-none">
                        <button type="submit" id="btn-submit" class="w-full bg-red-600 py-4 rounded-2xl font-black shadow-lg shadow-red-900/20 active:scale-95 transition-all">SALVAR NO MENU</button>
                        <button type="button" id="btn-cancel-edit" onclick="resetForm()" class="w-full bg-zinc-800 py-3 rounded-xl hidden text-zinc-400 font-bold mt-2">CANCELAR EDIÇÃO</button>
                    </form>
                </div>
            </section>

            <div id="admin-product-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- Sacola Modal -->
    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-end justify-center">
        <div class="bg-zinc-900 w-full max-w-md rounded-t-[40px] p-8 max-h-[95vh] overflow-y-auto hide-scrollbar border-t border-zinc-800">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black tracking-tighter">Sacola</h2>
                <button onclick="toggleCart(false)" class="bg-zinc-800 w-12 h-12 rounded-full flex items-center justify-center font-bold">✕</button>
            </div>
            <div id="cart-items" class="space-y-6 mb-10"></div>
            <div class="space-y-4 mb-8">
                <p class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Dados de Entrega</p>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full bg-zinc-800/50 rounded-2xl p-4 border border-zinc-800 focus:border-red-500 outline-none transition-all">
                <input type="text" id="cust-address" placeholder="Endereço Completo e Bairro" class="w-full bg-zinc-800/50 rounded-2xl p-4 border border-zinc-800 focus:border-red-500 outline-none transition-all">
            </div>
            <div class="flex justify-between items-end mb-8 border-t border-zinc-800 pt-6">
                <span class="text-zinc-500 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-4xl font-black text-green-500 leading-none">R$ 0,00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 py-5 rounded-[24px] font-black text-xl shadow-xl shadow-green-900/20 active:scale-95 transition-all">FINALIZAR NO WHATSAPP</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5598992370792";
        const ADMIN_PASS = "1234";
        const DATA_VERSION = "2.4";

        function initData() {
            const savedVersion = localStorage.getItem('@Menu:version');
            if (savedVersion !== DATA_VERSION) {
                localStorage.setItem('@Menu:version', DATA_VERSION);
            }

            const defaultCats = [
                { id: 'cat-1', name: '🍢 Churrasquinhos Nobres' },
                { id: 'cat-3', name: '🥗 Acompanhamentos' },
                { id: 'cat-2', name: '🥤 Bebidas Geladas' }
            ];

            const defaultProds = [
                { id: 1, name: "Espetinho de Alcatra", price: 12.00, desc: "Cortes selecionados de alcatra premium.", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400", category: "cat-1" },
                { id: 2, name: "Frango com Bacon", price: 10.00, desc: "Peito de frango envolto em bacon crocante.", img: "https://images.unsplash.com/photo-1532636875304-4c8911a008cb?w=400", category: "cat-1" },
                { id: 4, name: "Queijo Coalho", price: 11.00, desc: "Queijo coalho dourado e derretendo.", img: "https://images.unsplash.com/photo-1601050690597-df056fb1d745?w=400", category: "cat-1" },
                { id: 6, name: "Cerveja Heineken LN", price: 12.00, desc: "Long Neck 330ml gelada.", img: "https://images.unsplash.com/photo-1538944513120-5c8fe4323631?w=400", category: "cat-2" }
            ];

            window.CATEGORIES = JSON.parse(localStorage.getItem('@Menu:categories')) || defaultCats;
            window.PRODUCTS = JSON.parse(localStorage.getItem('@Menu:products')) || defaultProds;
            window.PIX_KEY = localStorage.getItem('@Menu:pixkey') || "CADASTRAR NO ADMIN";
            window.cart = [];
        }

        function save() {
            localStorage.setItem('@Menu:categories', JSON.stringify(CATEGORIES));
            localStorage.setItem('@Menu:products', JSON.stringify(PRODUCTS));
            localStorage.setItem('@Menu:pixkey', window.PIX_KEY);
            renderAll();
        }

        function updatePixKey() {
            const val = document.getElementById('pix-key-input').value;
            if(!val) return alert("Digite uma chave PIX!");
            window.PIX_KEY = val;
            save();
            alert("Chave PIX atualizada com sucesso!");
        }

        function filterMenu() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderMenu(query);
        }

        function renderMenu(query = "") {
            const container = document.getElementById('main-menu');
            const nav = document.getElementById('category-nav');
            container.innerHTML = ''; nav.innerHTML = '';

            CATEGORIES.forEach(cat => {
                const catProds = PRODUCTS.filter(p => p.category === cat.id && (p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query)));
                if (catProds.length === 0) return;

                nav.innerHTML += `<a href="#section-${cat.id}" class="py-4 px-4 text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition-all">${cat.name}</a>`;

                const section = document.createElement('div');
                section.id = `section-${cat.id}`;
                section.className = "animate-fade";
                section.innerHTML = `
                    <h2 class="text-sm font-black text-zinc-500 uppercase tracking-[0.2em] mb-4">${cat.name}</h2>
                    <div class="space-y-3">
                        ${catProds.map(p => `
                            <div class="product-card flex items-center gap-4 bg-zinc-900/40 p-4 rounded-3xl border border-zinc-800/50 backdrop-blur-sm relative">
                                <img src="${p.img}" class="w-24 h-24 rounded-2xl object-cover shadow-lg" loading="lazy">
                                <div class="flex-1 space-y-1">
                                    <h3 class="font-bold text-zinc-100 text-base">${p.name}</h3>
                                    <p class="text-xs text-zinc-500 line-clamp-2">${p.desc}</p>
                                    <div class="flex justify-between items-center pt-2">
                                        <span class="font-black text-red-500 text-lg">R$ ${p.price.toFixed(2)}</span>
                                        <button onclick="addToCart(${p.id})" class="bg-zinc-100 text-black w-10 h-10 rounded-2xl flex items-center justify-center shadow-xl active:scale-125 transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function addToCart(id) {
            const p = PRODUCTS.find(prod => prod.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) inCart.qty++; else cart.push({ ...p, qty: 1 });
            if (navigator.vibrate) navigator.vibrate(50);
            updateCartUI();
        }

        function removeFromCart(id) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx !== -1) { if (cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1); }
            updateCartUI();
        }

        function updateCartUI() {
            const itemsCont = document.getElementById('cart-items');
            const footer = document.getElementById('footer-cart');
            itemsCont.innerHTML = cart.length === 0 ? '<div class="text-center py-20 text-zinc-600 font-bold uppercase text-xs">Sacola vazia</div>' : '';
            
            let total = 0; let count = 0;
            cart.forEach(item => {
                total += item.price * item.qty; count += item.qty;
                itemsCont.innerHTML += `
                    <div class="flex justify-between items-center bg-zinc-800/50 p-5 rounded-3xl border border-zinc-800">
                        <div class="flex-1"><p class="font-bold text-zinc-100">${item.name}</p><p class="text-xs text-zinc-500">R$ ${item.price.toFixed(2)}</p></div>
                        <div class="flex items-center gap-5">
                            <button onclick="removeFromCart(${item.id})" class="w-10 h-10 rounded-xl bg-zinc-700 flex items-center justify-center">-</button>
                            <span class="font-black text-xl">${item.qty}</span>
                            <button onclick="addToCart(${item.id})" class="w-10 h-10 rounded-xl bg-red-600 flex items-center justify-center">+</button>
                        </div>
                    </div>
                `;
            });
            const tStr = `R$ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-total').innerText = tStr;
            document.getElementById('footer-total').innerText = tStr;
            document.getElementById('cart-count-badge').innerText = count;
            footer.classList.toggle('translate-y-full', cart.length === 0);
        }

        function toggleAdmin() {
            const pass = prompt("Senha Admin:");
            if (pass === ADMIN_PASS) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('pix-key-input').value = window.PIX_KEY === "CADASTRAR NO ADMIN" ? "" : window.PIX_KEY;
                renderAdminUI();
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); resetForm(); }
        function toggleCart(show) { document.getElementById('cart-modal').classList.toggle('hidden', !show); }
        
        function checkout() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            if (!n || !a || cart.length === 0) return alert("Preencha todos os dados!");
            
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0).toFixed(2);
            const pixKey = window.PIX_KEY || "CADASTRAR NO ADMIN";

            // Alerta de confirmação visual para o cliente antes do WhatsApp
            const confirmacao = confirm(
                `RESUMO DO PEDIDO\n` +
                `--------------------------\n` +
                `Total: R$ ${total}\n\n` +
                `⚠️ ATENÇÃO AO PAGAMENTO:\n` +
                `O pagamento deve ser feito via PIX.\n` +
                `Chave PIX: ${pixKey}\n\n` +
                `Deseja prosseguir e enviar o pedido para o WhatsApp?`
            );

            if(!confirmacao) return; // Cancela se o cliente não confirmar

            let msg = `*NOVO PEDIDO - FN CHURRASQUINHO*\n`;
            msg += `--------------------------\n`;
            msg += `*Cliente:* ${n}\n`;
            msg += `*Endereço:* ${a}\n\n`;
            msg += `*ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.qty}x ${i.name} (R$ ${(i.price * i.qty).toFixed(2)})\n`);
            msg += `\n*TOTAL: R$ ${total}*\n`;
            msg += `--------------------------\n`;
            msg += `*PAGAMENTO VIA PIX*\n`;
            msg += `*Chave:* ${pixKey}\n`;
            msg += `--------------------------\n`;
            msg += `_Favor enviar o comprovante após o pagamento._`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function updateStatusBadge() {
            const b = document.getElementById('status-badge');
            b.innerText = 'Aberto 24h';
            b.className = `mt-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-green-500/10 text-green-500 border border-green-500/20`;
        }

        function renderAdminUI() {
            const select = document.getElementById('p-cat'); select.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const catList = document.getElementById('admin-cat-list'); catList.innerHTML = CATEGORIES.map(c => `<div class="bg-zinc-800 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-zinc-700 flex items-center gap-2">${c.name} <button onclick="removeCategory('${c.id}')" class="text-red-500">×</button></div>`).join('');
            const adminProdList = document.getElementById('admin-product-list');
            adminProdList.innerHTML = PRODUCTS.map(p => `
                <div class="flex items-center justify-between bg-zinc-900 p-4 rounded-3xl border border-zinc-800 mt-2">
                    <div class="flex items-center gap-3">
                        <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover">
                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-zinc-500">R$ ${p.price.toFixed(2)}</p></div>
                    </div>
                    <div class="flex gap-2"><button onclick="editProduct(${p.id})" class="p-2 text-blue-400 bg-blue-500/10 rounded-lg text-xs font-bold">EDITAR</button><button onclick="deleteProduct(${p.id})" class="p-2 text-red-400 bg-red-500/10 rounded-lg text-xs font-bold">APAGAR</button></div>
                </div>
            `).join('');
        }

        function addCategory() {
            const i = document.getElementById('new-cat-name'); if (!i.value) return;
            CATEGORIES.push({ id: 'cat-' + Date.now(), name: i.value }); i.value = ''; save();
        }
        function removeCategory(id) { if (confirm("Remover categoria?")) { CATEGORIES = CATEGORIES.filter(c => c.id !== id); save(); } }
        function handleProductSubmit(e) {
            e.preventDefault(); const editId = document.getElementById('edit-id').value;
            const p = { id: editId ? parseInt(editId) : Date.now(), name: document.getElementById('p-name').value, price: parseFloat(document.getElementById('p-price').value), desc: document.getElementById('p-desc').value, img: document.getElementById('p-img').value || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200', category: document.getElementById('p-cat').value };
            if (editId) { const idx = PRODUCTS.findIndex(pr => pr.id === parseInt(editId)); PRODUCTS[idx] = p; } else PRODUCTS.push(p);
            save(); resetForm();
        }
        function editProduct(id) {
            const p = PRODUCTS.find(pr => pr.id === id); document.getElementById('edit-id').value = p.id; document.getElementById('p-name').value = p.name; document.getElementById('p-price').value = p.price; document.getElementById('p-desc').value = p.desc; document.getElementById('p-img').value = p.img; document.getElementById('p-cat').value = p.category;
            document.getElementById('btn-submit').innerText = "ATUALIZAR ITEM"; document.getElementById('form-title').innerText = "Editando Item"; document.getElementById('btn-cancel-edit').classList.remove('hidden');
        }
        function deleteProduct(id) { if (confirm("Excluir item?")) { PRODUCTS = PRODUCTS.filter(p => p.id !== id); save(); } }
        function resetForm() { document.getElementById('product-form').reset(); document.getElementById('edit-id').value = ""; document.getElementById('btn-submit').innerText = "SALVAR NO MENU"; document.getElementById('btn-cancel-edit').classList.add('hidden'); }
        function renderAll() { renderMenu(); updateStatusBadge(); updateCartUI(); }

        initData(); renderAll(); setInterval(updateStatusBadge, 60000);
    </script>
</body>
</html>
